<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A Temple photo album showcasing Latter-day Saint templesaround the world, created by Daniel for WDD131 Dynamic Web Fudamentals." />
  <meta name="author" content="Daniel Venancio" />
  <title>Temple Album</title> 
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/temples.css" />
  <link rel="stylesheet" href="styles/temples-large.css" />
  <script src="scripts/temples.js" defer></script>
</head>
<body>

  <header>
    <div class="header-inner">
      <h2 class="site-title">Temple Album</h2>
      <button id="hamburger" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
      <nav id="main-nav">
        <a href="#">Home</a>
        <a href="#">Old</a>
        <a href="#">New</a>
        <a href="#">Large</a>
        <a href="#">Small</a>
      </nav>
    </div>
  </header>

  <main>
    <h1>Latter-day Saint Temples</h1>
    <div class="gallery">

      <figure>
        <img src="images/saltlake.jpg" alt="Salt Lake Temple" loading="lazy" />
        <figcaption>Salt Lake Temple</figcaption>
      </figure>

      <figure>
        <img src="images/mantiutah.jpg" alt="Manti Utah Temple" loading="lazy" />
        <figcaption>Manti Utah Temple</figcaption>
      </figure>

      <figure>
        <img src="images/nauvoo.jpg" alt="Nauvoo Illinois Temple" loading="lazy" />
        <figcaption>Nauvoo Illinois Temple</figcaption>
      </figure>

      <figure>
        <img src="images/washingtondc.jpg" alt="Washington D.C. Temple" loading="lazy" />
        <figcaption>Washington D.C. Temple</figcaption>
      </figure>

      <figure>
        <img src="images/losangelescalifornia.jpg" alt="Los Angeles California Temple" loading="lazy" />
        <figcaption>Los Angeles California Temple</figcaption>
      </figure>

      <figure>
        <img src="images/accraghana.jpg" alt="Accra Ghana Temple" loading="lazy" />
        <figcaption>Accra Ghana Temple</figcaption>
      </figure>

      <figure>
        <img src="images/mexicocitymexico.jpg" alt="Mexico City Mexico Temple" loading="lazy" />
        <figcaption>Mexico City Mexico Temple</figcaption>
      </figure>

      <figure>
        <img src="images/romeitaly.jpg" alt="Rome Italy Temple" loading="lazy" />
        <figcaption>Rome Italy Temple</figcaption>
      </figure>

      <figure>
        <img src="images/limaperu.jpg" alt="Lima Peru Temple" loading="lazy" />
        <figcaption>Lima Peru Temple</figcaption>
      </figure>

    </div>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Temple Album &mdash; Daniel</p>
    <p>Last Modified: <span id="last-modified"></span></p>
  </footer>

</body>
</html>
