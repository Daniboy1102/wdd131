<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A form for submitting product reviews, W005" />
  <meta name="author" content="Daniel Venancio" />
  <title>Product Review | WDD131</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/form.css">
</head>
<body>
  <header>
    <h1>Product Reviews</h1>
    <p class="subtitle">Share your experience</p>
  </header>

  <main>
    <form method="get" action="review.html" id="reviewForm">
      <h2>Submit a Review</h2>

      <!--Product Name -->
      <div class="form-group">
        <label for="productName">Product Name</label>
        <select id="productName" name="productName" required>
          <option value="" disabled selected>Select a Product ...</option>
        </select>
      </div>

      <!--Rating -->
      <div class="form-group">
        <fieldset class="rating-fieldset">
          <legend>Overall Rating</legend>
          <div class="star-group">
            <input type="radio" id="star5" name="rating" value="5" required>
            <label for="star5" title="5 stars">&#9733;</label>

            <input type="radio" id="star4" name="rating" value="4">
            <label for="star4" title="4 stars">&#9733;</label>

            <input type="radio" id="star3" name="rating" value="3">
            <label for="star3" title="3 stars">&#9733;</label>

            <input type="radio" id="star2" name="rating" value="2">
            <label for="star2" title="2 stars">&#9733;</label>

            <input type="radio" id="star1" name="rating" value="1">
            <label for="star1" title="1 star">&#9733;</label>
          </div>
        </fieldset>
      </div>

      <!--Instalation Date-->
      <div class="form-group">
        <label for="installDate">Date of Installation</label>
        <input type="date" id="installDate" name="installDate" required>
      </div>

      <!--Features -->
      <div class="form-group">
        <fieldset>
          <legend>Useful Features <span class="optional">(check all that apply)</span></legend>
          <div class="checkbox-group">
            <div class="checkbox-item">
              <input type="checkbox" id="feature1" name="features" value="Easy to Install">
              <label for="feature1">Easy to Install</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="feature2" name="features" value="Durable">
              <label for="feature2">Durable</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="feature3" name="features" value="Energy Efficient">
              <label for="feature3">Energy Efficient</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="feature4" name="features" value="Good Value">
              <label for="feature4">Good Value</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="feature5" name="features" value="High Performance">
              <label for="feature5">High Performance</label>
            </div>
          </div>
        </fieldset>
      </div>

      <!--Review-->
      <div class="form-group">
        <label for="writtenReview">Written Review <span class="optional">(optional)</span></label>
        <textarea id="writtenReview" name="writtenReview" rows="5" placeholder="Tell us about your experience..."></textarea>
      </div>

      <!--User Name-->
      <div class="form-group">
        <label for="userName">Your Name <span class="optional">(optional)</span></label>
        <input type="text" id="userName" name="userName" placeholder="Enter your name">
      </div>

      <!--Submit-->
      <div class="form-group">
        <input type="submit" value="Submit Review">
      </div>
    </form>
  </main>

  <footer>
    <p>WDD131 &mdash; Daniel Venancio &copy; Angola<span id="year"></span></p>
    <p>Last modified: <span id="lastModified"></span></p>
  </footer>

  <script src="scripts/form.js"></script>
</body>
</html>
